<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dolphin Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --off-white: #f4f9ff;
            --blue-100: #dbeeff;
            --blue-200: #b0d9ff;
            --blue-300: #6cb8ff;
            --blue-400: #2d9cff;
            --blue-500: #0a7ef0;
            --blue-600: #0060c7;
            --ink: #0a1628;
            --ink-soft: #3a5070;
            --ink-muted: #7a96b8;
            --bubble-user: #0a7ef0;
            --bubble-bot: #ffffff;
            --glow: 0 0 40px rgba(45,156,255,0.18);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--off-white);
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(107,184,255,0.28) 0%, transparent 70%);
            top: -200px; right: -150px;
        }
        body::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(45,156,255,0.15) 0%, transparent 70%);
            bottom: -200px; left: -100px;
        }

        .app {
            width: 100%;
            max-width: 740px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            padding: 28px 32px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(45,156,255,0.12);
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .logo {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 16px rgba(10,126,240,0.35);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--ink);
        }
        .header-text span {
            font-size: 12px;
            color: var(--blue-500);
            font-weight: 500;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22d97a;
            box-shadow: 0 0 0 3px rgba(34,217,122,0.2);
            margin-left: auto;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 3px rgba(34,217,122,0.2); }
            50% { box-shadow: 0 0 0 6px rgba(34,217,122,0.08); }
        }

        /* Messages area */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 4px; }

        /* Welcome state */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-align: center;
            padding: 40px 0;
            opacity: 0;
            animation: fade-in 0.6s 0.3s ease forwards;
        }
        .welcome-icon { font-size: 52px; line-height: 1; }
        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: -0.3px;
        }
        .welcome p {
            font-size: 14px;
            color: var(--ink-muted);
            font-weight: 400;
            max-width: 300px;
            line-height: 1.6;
        }

        /* Message bubbles */
        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            opacity: 0;
            transform: translateY(10px);
            animation: msg-in 0.35s ease forwards;
        }
        @keyframes msg-in {
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-row.user { flex-direction: row-reverse; }

        .avatar {
            width: 32px; height: 32px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }
        .avatar.bot {
            background: linear-gradient(135deg, var(--blue-300), var(--blue-500));
            box-shadow: 0 2px 10px rgba(10,126,240,0.25);
        }
        .avatar.user-av {
            background: var(--blue-100);
            border: 1.5px solid var(--blue-200);
        }

        .bubble {
            max-width: 72%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14.5px;
            line-height: 1.65;
            font-weight: 400;
            position: relative;
            word-break: break-word;
        }
        .bubble.bot {
            background: var(--white);
            color: var(--ink);
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 2px 12px rgba(10,40,100,0.07), 0 0 0 1px rgba(45,156,255,0.1);
        }
        .bubble.user {
            background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
            color: white;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 4px 16px rgba(10,96,199,0.3);
        }

        .bubble-meta {
            font-size: 10.5px;
            margin-top: 5px;
            font-family: 'Space Mono', monospace;
            opacity: 0.5;
            display: block;
        }
        .bubble.user .bubble-meta { text-align: right; color: rgba(255,255,255,0.7); }
        .bubble.bot .bubble-meta { color: var(--ink-muted); }

        /* Typing indicator */
        .typing-row { display: flex; gap: 10px; align-items: flex-end; }
        .typing-bubble {
            background: var(--white);
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 2px 12px rgba(10,40,100,0.07), 0 0 0 1px rgba(45,156,255,0.1);
            padding: 14px 18px;
            display: flex; gap: 5px; align-items: center;
        }
        .typing-bubble span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--blue-300);
            display: block;
            animation: bounce 1.2s ease-in-out infinite;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 20px 32px 28px;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(45,156,255,0.1);
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--white);
            border: 1.5px solid var(--blue-200);
            border-radius: 16px;
            padding: 10px 10px 10px 18px;
            box-shadow: 0 2px 20px rgba(45,156,255,0.1);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-row:focus-within {
            border-color: var(--blue-400);
            box-shadow: 0 0 0 4px rgba(45,156,255,0.12), 0 2px 20px rgba(45,156,255,0.12);
        }

        #input {
            flex: 1;
            border: none; outline: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
            color: var(--ink);
            resize: none;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.5;
        }
        #input::placeholder { color: var(--ink-muted); }

        #send-btn {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue-400), var(--blue-600));
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(10,96,199,0.35);
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        #send-btn:hover { transform: scale(1.06); box-shadow: 0 6px 18px rgba(10,96,199,0.45); }
        #send-btn:active { transform: scale(0.96); }
        #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        #send-btn svg { width: 17px; height: 17px; fill: white; }

        .input-hint {
            font-size: 11px;
            color: var(--ink-muted);
            margin-top: 8px;
            padding-left: 2px;
            font-family: 'Space Mono', monospace;
        }
        .input-hint kbd {
            background: var(--blue-100);
            color: var(--blue-600);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            header { padding: 20px 16px; }
            #messages { padding: 20px 16px; }
            .input-area { padding: 14px 16px 22px; }
            .bubble { max-width: 86%; }
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="logo">🐬</div>
        <div class="header-text">
            <h1>Dolphin Chat</h1>
            <span>LOCAL MODEL · ONLINE</span>
        </div>
        <div class="status-dot"></div>
    </header>

    <div id="messages">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">🐬</div>
            <h2>Hey there, I'm Dolphin</h2>
            <p>Your local AI assistant. Ask me anything — I'm running right here on your machine.</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <textarea id="input" placeholder="Ask something…" rows="1"></textarea>
            <button id="send-btn" onclick="send()" title="Send message">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for newline</p>
    </div>
</div>

<script>
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const sendBtn = document.getElementById("send-btn");

    // Auto-grow textarea
    input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function removeWelcome() {
        const w = document.getElementById("welcome");
        if (w) w.remove();
    }

    function appendMsg(role, text) {
        removeWelcome();
        const isUser = role === "user";
        const row = document.createElement("div");
        row.className = `msg-row${isUser ? " user" : ""}`;

        const avatar = document.createElement("div");
        avatar.className = `avatar ${isUser ? "user-av" : "bot"}`;
        avatar.textContent = isUser ? "👤" : "🐬";

        const bubble = document.createElement("div");
        bubble.className = `bubble ${isUser ? "user" : "bot"}`;
        bubble.innerHTML = `${escapeHTML(text)}<span class="bubble-meta">${getTime()}</span>`;

        row.appendChild(avatar);
        row.appendChild(bubble);
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
        removeWelcome();
        const row = document.createElement("div");
        row.className = "typing-row";
        row.id = "typing";
        row.innerHTML = `
            <div class="avatar bot">🐬</div>
            <div class="typing-bubble">
                <span></span><span></span><span></span>
            </div>`;
        messages.appendChild(row);
        messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    function escapeHTML(str) {
        return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function send() {
        const text = input.value.trim();
        if (!text) return;

        appendMsg("user", text);
        input.value = "";
        input.style.height = "auto";
        sendBtn.disabled = true;
        showTyping();

        try {
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            removeTyping();
            appendMsg("bot", data.response);
        } catch (err) {
            removeTyping();
            appendMsg("bot", " Could not reach the server. Is your local model running?");
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    }
</script>
</body>
</html>
